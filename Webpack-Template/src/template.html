<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Messaging App</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <h1>Chat Room</h1>
            <p>Send messages to your friends</p>
          </div>
        </header>

        <section id="message-list" class="message-list" aria-live="polite"></section>

        <form id="message-form" class="message-form">
          <input id="message-input" type="text" placeholder="Type your message..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
  </body>
</html>
